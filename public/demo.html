<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/variable/pretendard-dynamic-subset.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@latest/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
<title>FreshFlow AI — 라이브 데모</title>
<style>
  :root{ --blue:#3182F6; --ink:#191F28; --paper:#F2F4F6; --line:#E5E8EB; --dim:#6B7684;
    --body:'Pretendard Variable',Pretendard,system-ui,sans-serif;
    --head:'Wanted Sans Variable','Pretendard Variable',Pretendard,sans-serif; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--paper);overflow:hidden;font-family:var(--body);}
  #app{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;}
  /* 상단 진행바 */
  #bar{position:fixed;left:0;top:0;height:3px;width:0;background:var(--blue);z-index:20;}
  /* 단계 캡션 (좌하단) */
  #cap{position:fixed;left:22px;bottom:20px;z-index:20;display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,.94);backdrop-filter:blur(6px);border:1px solid var(--line);
    border-radius:12px;padding:10px 16px;box-shadow:0 6px 24px rgba(0,27,55,.10);
    font-family:var(--head);font-weight:600;font-size:16px;color:var(--ink);
    opacity:0;transition:opacity .4s ease;letter-spacing:-.3px;}
  #cap.on{opacity:1;}
  #cap .dot{width:9px;height:9px;border-radius:50%;background:var(--blue);flex-shrink:0;}
  /* 브랜드 (우하단) */
  #brand{position:fixed;right:22px;bottom:20px;z-index:20;font-family:var(--head);font-weight:700;
    font-size:15px;color:var(--ink);background:rgba(255,255,255,.9);border:1px solid var(--line);
    border-radius:10px;padding:7px 13px;}
  #brand .b{color:var(--blue);}
  /* 다시 재생 */
  #replay{position:fixed;right:22px;bottom:64px;z-index:20;display:none;cursor:pointer;
    font-family:var(--head);font-weight:600;font-size:14px;color:#fff;background:var(--blue);
    border:none;border-radius:9px;padding:9px 16px;}
  #replay.on{display:block;}
</style>
</head>
<body>
  <iframe id="app" src="/?demo=1" title="FreshFlow AI 대시보드"></iframe>
  <div id="bar"></div>
  <div id="cap"><span class="dot"></span><span id="capText">로딩 중…</span></div>
  <div id="brand">FreshFlow <span class="b">AI</span> · 라이브 데모</div>
  <button id="replay">▶ 다시 재생</button>

<script>
  const f=document.getElementById('app'), bar=document.getElementById('bar');
  const cap=document.getElementById('cap'), capText=document.getElementById('capText'), replay=document.getElementById('replay');
  const SCD=3600;            // 스크롤 지속(천천히)
  const TOTAL=25000;         // 진행바 총 길이(대략)
  let timers=[];
  function clearAll(){ timers.forEach(clearTimeout); timers=[]; }
  function smoothScrollTo(win,y,dur){
    const start=win.scrollY||0, t0=performance.now();
    const step=()=>{ const p=Math.min(1,(performance.now()-t0)/dur), e=1-Math.pow(1-p,3);
      try{ win.scrollTo(0, start+(y-start)*e); }catch(err){} if(p<1) setTimeout(step,16); };
    step();
  }
  function setCap(t){ capText.textContent=t; cap.classList.add('on'); }
  function drive(){
    let doc; try{ doc=f.contentDocument; }catch(e){ setCap('데모를 불러오지 못했습니다'); return; }
    if(!doc){ return; } const win=f.contentWindow;
    const btn=(kw)=>{ try{ return [...doc.querySelectorAll('button')].find(b=>b.textContent.includes(kw)); }catch(e){ return null; } };
    const span=(kw)=>{ try{ return [...doc.querySelectorAll('span')].find(e=>e.textContent.includes(kw)); }catch(e){ return null; } };
    const scrollTo=(kw)=>{ const el=span(kw); if(el){ try{ smoothScrollTo(win, el.getBoundingClientRect().top+(win.scrollY||0)-20, SCD); }catch(e){} } };
    let tries=0;
    const iv=setInterval(()=>{
      if(btn('칠레산 체리')){ clearInterval(iv); run(); }
      else if(++tries>80){ clearInterval(iv); setCap('데모 로딩 지연 — 새로고침 해주세요'); }
    },120);
    function run(){
      // [대기(ms), 캡션, 동작]
      const steps=[
        [900,  '① 칠레산 체리(위기 화물) 조회', ()=>{ const c=btn('칠레산 체리'); if(c)c.click(); }],
        [4600, '② Port-to-FC 리드타임 — 어디서 새는가', ()=>scrollTo('어디서 새는가')],
        [4600, '③ 평소와 다른 신호, 결품 전에 감지', ()=>scrollTo('이상 신호 조기경보')],
        [2200, '③ 실시간 모니터링 실행', ()=>{ const b=btn('실시간 모니터링 시작'); if(b)b.click(); }],
        [4600, '④ 선제 조치 — 보고 바로 실행', ()=>scrollTo('선제 조치')],
        [2200, '④ 선제배치 실행 → 결품 위험 2→0', ()=>{ const b=btn('배치 실행'); if(b)b.click(); }],
        [4600, '⑤ 비용 임팩트 — 순절감 확인', ()=>scrollTo('비용 임팩트')],
      ];
      let i=0;
      const next=()=>{ if(i>=steps.length){ replay.classList.add('on'); return; }
        const s=steps[i]; setCap(s[1]); try{ s[2](); }catch(e){} i++; timers.push(setTimeout(next,s[0])); };
      next();
    }
  }
  function play(){
    clearAll(); replay.classList.remove('on'); cap.classList.remove('on');
    bar.style.transition='none'; bar.style.width='0';
    requestAnimationFrame(()=>{ bar.style.transition=`width ${TOTAL}ms linear`; bar.style.width='100%'; });
    f.onload=()=>{ try{ drive(); }catch(e){} };
    f.src='/?demo=1&t='+Date.now();  // 매번 새로 로드해 처음부터
  }
  replay.onclick=play;
  document.addEventListener('keydown',e=>{ if(e.key==='r'||e.key==='R')play(); });
  // 폰트/앱 로드 후 시작 (지연돼도 보장)
  let started=false; const start=()=>{ if(started)return; started=true; drive(); };
  f.addEventListener('load', start, {once:true});
  setTimeout(start, 2500);
</script>
</body>
</html>
